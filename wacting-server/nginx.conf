# Nginx Configuration for Wacting.com
# This configures reverse proxying from the standard HTTP(s) web ports (80/443)
# To the internal high-speed Node.js Fastify + Socket.io instance on port 3000

server {
    listen 80;
    server_name wacting.com www.wacting.com;

    # Basic API routing
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # High-Performance WebSocket Tunneling for the Brownian Engine
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        
        # Disable caching for real-time streams
        proxy_cache_bypass $http_upgrade;
        
        # Extended timeouts for persistent movement streams
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
