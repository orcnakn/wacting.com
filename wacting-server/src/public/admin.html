<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wacting Admin Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }
    header { background: #111; border-bottom: 1px solid #222; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 20px; letter-spacing: 3px; color: #4A90E2; }
    #refresh-indicator { font-size: 12px; color: #555; margin-left: 8px; }
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 40px; width: 360px; }
    .login-box h2 { margin-bottom: 24px; font-size: 18px; color: #fff; }
    input { width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #4A90E2; }
    textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; resize: vertical; min-height: 80px; }
    button { width: 100%; padding: 12px; background: #4A90E2; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
    button:hover { background: #357ABD; }
    button.danger { background: #c0392b; } button.danger:hover { background: #a93226; }
    button.success { background: #27ae60; } button.success:hover { background: #219a52; }
    button.warn { background: #d68910; } button.warn:hover { background: #b7770d; }
    button.notify-btn { background: #7b2fbe; } button.notify-btn:hover { background: #6a1fa8; }
    button.sm { width: auto; padding: 6px 14px; font-size: 12px; margin: 2px; }
    #main { display: none; padding: 32px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 18px; text-align: center; transition: border-color .2s, transform .1s; }
    .stat-card.clickable { cursor: pointer; }
    .stat-card.clickable:hover { border-color: #4A90E2; transform: translateY(-2px); }
    .stat-card.active-filter { border-color: #4A90E2 !important; background: #0f1a2e; }
    .stat-card .num { font-size: 30px; font-weight: bold; color: #4A90E2; }
    .stat-card .num.green { color: #2ecc71; } .stat-card .num.red { color: #e74c3c; } .stat-card .num.amber { color: #f39c12; }
    .stat-card .label { font-size: 11px; color: #888; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .stat-card .filter-hint { font-size: 10px; color: #4A90E2; margin-top: 6px; opacity: 0; transition: opacity .2s; }
    .stat-card.clickable:hover .filter-hint { opacity: 1; }
    .section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
    .section h2 { font-size: 15px; margin-bottom: 16px; color: #fff; display: flex; align-items: center; gap: 8px; }
    .section h2 .sub { font-size: 12px; color: #555; font-weight: normal; margin-left: auto; }
    .active-filter-bar { background: #0f1a2e; border: 1px solid #1a3a6a; border-radius: 8px; padding: 8px 14px; margin-bottom: 12px; display: none; align-items: center; gap: 10px; font-size: 13px; color: #4A90E2; }
    .active-filter-bar button { width: auto; padding: 4px 10px; font-size: 11px; background: #1a3a6a; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filters input { margin: 0; flex: 1; min-width: 180px; }
    .filters select { padding: 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 13px; outline: none; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 9px 10px; background: #1e1e1e; color: #777; font-weight: 500; border-bottom: 1px solid #2a2a2a; white-space: nowrap; }
    td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
    tr:hover td { background: #1e1e1e; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge.active { background: #1a3a2a; color: #2ecc71; } .badge.banned { background: #3a1a1a; color: #e74c3c; }
    .badge.verified { background: #1a2a3a; color: #4A90E2; } .badge.pending { background: #3a3020; color: #f39c12; }
    .badge.bot { background: #1a2a3a; color: #00bcd4; } .badge.bug { background: #3a1a1a; color: #e74c3c; }
    .badge.suggestion { background: #1a2a3a; color: #4A90E2; } .badge.feedback { background: #1a3a2a; color: #2ecc71; }
    .badge.unread { background: #3a3020; color: #f39c12; } .badge.read { background: #1a2a1a; color: #555; }
    .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #2a2a2a; }
    .tab { padding: 10px 20px; cursor: pointer; color: #666; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; transition: all .2s; }
    .tab:hover { color: #ccc; }
    .tab.active { color: #4A90E2; border-bottom-color: #4A90E2; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .note-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 14px; margin-bottom: 8px; }
    .note-card .note-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: #666; margin-bottom: 6px; }
    .note-card .note-text { font-size: 13px; color: #ccc; line-height: 1.5; }
    .pager { display: flex; align-items: center; gap: 12px; margin-top: 16px; justify-content: flex-end; }
    .pager span { color: #666; font-size: 13px; }
    #error-msg { color: #e74c3c; margin-top: 10px; font-size: 13px; text-align: center; }
    .loading { color: #555; text-align: center; padding: 32px; font-size: 13px; }
    .new-reg { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #0f1a0f; border: 1px solid #1a3a1a; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
    .new-reg .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
    .new-reg .email { color: #ccc; flex: 1; }
    .new-reg .time { color: #555; font-size: 11px; white-space: nowrap; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#1a1a1a; border:1px solid #333; border-radius:14px; padding:32px; max-width:520px; width:90%; max-height:80vh; overflow-y:auto; }
    .modal-box h3 { font-size:16px; margin-bottom:16px; color:#fff; }
    .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222; font-size:13px; }
    .detail-row .k { color:#666; } .detail-row .v { color:#ccc; text-align:right; max-width:60%; word-break:break-all; }
    .modal-close { margin-top:16px; }
  </style>
</head>
<body>
<header>
  <h1>WACTING</h1>
  <span style="color:#666;font-size:13px;">Admin Panel</span>
  <span id="refresh-indicator"></span>
  <span id="admin-name" style="margin-left:auto;color:#4A90E2;font-size:13px;"></span>
  <button class="sm danger" id="logout-btn" style="display:none;width:auto;margin-left:12px;" onclick="logout()">Çıkış</button>
</header>

<div id="login-screen">
  <div class="login-box">
    <h2>Admin Girişi</h2>
    <input type="email" id="login-email" placeholder="Email" />
    <input type="password" id="login-pass" placeholder="Şifre" />
    <button onclick="doLogin()">GİRİŞ YAP</button>
    <div id="error-msg"></div>
  </div>
</div>

<div id="main">
  <div class="stats-grid" id="stats-grid"><div class="loading">Yükleniyor...</div></div>

  <div class="section">
    <h2>🆕 Son Kayıtlar <span class="sub" id="recent-time"></span></h2>
    <div id="recent-list"><div class="loading">Yükleniyor...</div></div>
  </div>

  <div class="section" style="padding-bottom:0;">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('users')">👥 Kullanıcılar</div>
      <div class="tab" onclick="switchTab('campaigns')">🏳 Kampanyalar</div>
      <div class="tab" onclick="switchTab('wallets')">💰 Cüzdanlar</div>
      <div class="tab" onclick="switchTab('devnotes')">📝 Geliştirici Notları</div>
    </div>
  </div>

  <!-- USERS TAB -->
  <div class="tab-content active" id="tab-users">
    <div class="section" style="border-top:none;border-radius:0 0 10px 10px;margin-top:-1px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span class="sub" id="users-count"></span>
      </div>
      <div class="active-filter-bar" id="filter-bar">
        <span id="filter-label"></span>
        <button onclick="clearFilter()">✕ Filtreyi Kaldır</button>
      </div>
      <div class="filters">
        <input type="text" id="search-input" placeholder="Email veya kullanıcı adı ara..." oninput="debounceSearch()" />
        <select id="status-filter" onchange="loadUsers(1)">
          <option value="">Tüm Durumlar</option>
          <option value="ACTIVE">Aktif</option>
          <option value="BANNED">Banlı</option>
        </select>
        <select id="verified-filter" onchange="loadUsers(1)">
          <option value="">Tüm Emailler</option>
          <option value="true">Doğrulanmış</option>
          <option value="false">Doğrulanmamış</option>
        </select>
        <select id="bot-filter" onchange="loadUsers(1)">
          <option value="">Tümü</option>
          <option value="false">Gerçek Kullanıcılar</option>
          <option value="true">Bot Hesaplar</option>
        </select>
      </div>
      <div id="users-table"><div class="loading">Yükleniyor...</div></div>
      <div class="pager">
        <button class="sm" onclick="changePage(-1)">← Önceki</button>
        <span id="page-info">1</span>
        <button class="sm" onclick="changePage(1)">Sonraki →</button>
      </div>
    </div>
  </div>

  <!-- WALLETS TAB -->
  <div class="tab-content" id="tab-wallets">
    <div class="section" style="border-top:none;border-radius:0 0 10px 10px;margin-top:-1px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span class="sub" id="wallets-count"></span>
      </div>
      <div class="filters">
        <input type="text" id="wallet-search" placeholder="Email veya kullanıcı adı ara..." oninput="debounceWalletSearch()" />
        <select id="wallet-sort" onchange="loadWallets(1)">
          <option value="wacBalance">WAC (Yüksek → Düşük)</option>
          <option value="racBalance">RAC (Yüksek → Düşük)</option>
        </select>
      </div>
      <div id="wallets-table"><div class="loading">Yükleniyor...</div></div>
      <div class="pager">
        <button class="sm" onclick="changeWalletPage(-1)">← Önceki</button>
        <span id="wallet-page-info">1</span>
        <button class="sm" onclick="changeWalletPage(1)">Sonraki →</button>
      </div>
    </div>
  </div>

  <!-- CAMPAIGNS TAB -->
  <div class="tab-content" id="tab-campaigns">
    <div class="section" style="border-top:none;border-radius:0 0 10px 10px;margin-top:-1px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span class="sub" id="campaigns-count"></span>
      </div>
      <div id="campaigns-table"><div class="loading">Yükleniyor...</div></div>
      <div class="pager">
        <button class="sm" onclick="changeCampaignPage(-1)">← Önceki</button>
        <span id="campaign-page-info">1</span>
        <button class="sm" onclick="changeCampaignPage(1)">Sonraki →</button>
      </div>
    </div>
  </div>

  <!-- DEV NOTES TAB -->
  <div class="tab-content" id="tab-devnotes">
    <div class="section" style="border-top:none;border-radius:0 0 10px 10px;margin-top:-1px;">
      <div class="filters">
        <select id="note-category-filter" onchange="loadDevNotes(1)">
          <option value="">Tüm Kategoriler</option>
          <option value="BUG">🐛 Bug</option>
          <option value="SUGGESTION">💡 Öneri</option>
          <option value="FEEDBACK">💬 Geri Bildirim</option>
        </select>
        <select id="note-read-filter" onchange="loadDevNotes(1)">
          <option value="">Tümü</option>
          <option value="false">Okunmamış</option>
          <option value="true">Okunmuş</option>
        </select>
      </div>
      <div id="devnotes-list"><div class="loading">Henüz not yok.</div></div>
      <div class="pager">
        <button class="sm" onclick="changeNotePage(-1)">← Önceki</button>
        <span id="note-page-info">1</span>
        <button class="sm" onclick="changeNotePage(1)">Sonraki →</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="closeModalBg(event,'detail-modal')">
  <div class="modal-box">
    <h3 id="detail-title">Kullanıcı Detayı</h3>
    <div id="detail-content"></div>
    <button class="sm modal-close" onclick="closeModal('detail-modal')">Kapat</button>
  </div>
</div>

<!-- Notify Modal -->
<div class="modal-overlay" id="notify-modal" onclick="closeModalBg(event,'notify-modal')">
  <div class="modal-box">
    <h3>📢 Bildirim Gönder</h3>
    <input type="hidden" id="notify-user-id" />
    <div style="margin-bottom:8px;font-size:13px;color:#888;" id="notify-user-email"></div>
    <input type="text" id="notify-title" placeholder="Bildirim başlığı..." style="margin-bottom:8px;" />
    <textarea id="notify-message" placeholder="Mesaj içeriği..."></textarea>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="notify-btn" onclick="sendNotify()" style="flex:1;">Gönder</button>
      <button class="sm warn" onclick="closeModal('notify-modal')" style="flex:0.4;">İptal</button>
    </div>
    <div id="notify-result" style="margin-top:10px;font-size:13px;text-align:center;"></div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('wacting_admin_token') || '';
let currentPage = 1;
let searchTimer = null;
let refreshTimer = null;
let refreshCountdown = 30;
let activeFilter = null; // null | 'today' | 'week' | 'all'

if (token) tryAutoLogin();

async function tryAutoLogin() {
  try {
    const res = await apiFetch('/admin/stats');
    if (res.ok) showMain();
    else { token = ''; localStorage.removeItem('wacting_admin_token'); }
  } catch { token = ''; }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  document.getElementById('error-msg').textContent = '';
  try {
    const res = await fetch(API + '/auth/email/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password:pass}) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('error-msg').textContent = data.error || 'Giriş başarısız.'; return; }
    token = data.token;
    localStorage.setItem('wacting_admin_token', token);
    const statsRes = await apiFetch('/admin/stats');
    if (!statsRes.ok) { document.getElementById('error-msg').textContent = 'Admin yetkisi yok.'; token = ''; return; }
    showMain();
  } catch { document.getElementById('error-msg').textContent = 'Sunucuya bağlanılamadı.'; }
}

function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'inline-block';
  loadAll();
  startAutoRefresh();
}

function logout() { token = ''; clearInterval(refreshTimer); localStorage.removeItem('wacting_admin_token'); location.reload(); }

async function apiFetch(url, opts = {}) {
  return fetch(API + url, { ...opts, headers: {'Authorization':'Bearer '+token,'Content-Type':'application/json',...(opts.headers||{})} });
}

function loadAll() { loadStats(); loadRecent(); loadUsers(1); loadCampaigns(1); loadDevNotes(1); }

function startAutoRefresh() {
  refreshCountdown = 30;
  updateCountdown();
  refreshTimer = setInterval(() => {
    refreshCountdown--;
    updateCountdown();
    if (refreshCountdown <= 0) { refreshCountdown = 30; loadAll(); }
  }, 1000);
}
function updateCountdown() { document.getElementById('refresh-indicator').textContent = '↻ ' + refreshCountdown + 's'; }

async function loadStats() {
  const res = await apiFetch('/admin/stats');
  const d = await res.json();
  const todayIso = new Date(Date.now() - 86400000).toISOString();
  const weekIso  = new Date(Date.now() - 7*86400000).toISOString();
  const cards = [
    { num: d.totalUsers,      label: 'Toplam Üye',      cls: '',      filter: 'all',   iso: null,      hint: '↓ Tümünü göster' },
    { num: d.todayUsers,      label: 'Bugün Kayıt',     cls: 'green', filter: 'today', iso: todayIso,  hint: '↓ Bugün kayıtları' },
    { num: d.weekUsers,       label: 'Bu Hafta',        cls: 'green', filter: 'week',  iso: weekIso,   hint: '↓ Bu hafta kayıtları' },
    { num: d.verifiedUsers,   label: 'Doğrulanmış',     cls: 'green', filter: 'verified',  iso: null, hint: '↓ Doğrulanmış' },
    { num: d.unverifiedUsers, label: 'Bekliyor',        cls: 'amber', filter: 'unverified', iso: null, hint: '↓ Bekleyenler' },
    { num: d.bannedUsers,     label: 'Banlı',           cls: 'red',   filter: 'banned',    iso: null, hint: '↓ Banlılar' },
    { num: d.activeWacUsers,  label: 'Aktif WAC',       cls: '',      filter: null,    iso: null,      hint: '' },
    { num: d.activeCampaigns, label: 'Aktif Kampanya',  cls: '',      filter: null,    iso: null,      hint: '' },
    { num: d.totalCampaigns,  label: 'Toplam Kampanya', cls: '',      filter: null,    iso: null,      hint: '' },
    { num: d.botUsers ?? 0,      label: 'Bot Hesaplar',    cls: '',   filter: 'bots',  iso: null, hint: '↓ Botlar' },
    { num: d.devNotesTotal ?? 0, label: 'Dev Notlar',      cls: '',      filter: null,    iso: null,      hint: '' },
    { num: d.devNotesUnread ?? 0,label: 'Okunmamış Not',   cls: 'amber', filter: null,    iso: null,      hint: '' },
    { num: parseFloat(d.totalWacCirculation ?? '0').toFixed(2), label: 'WAC Dolaşım', cls: 'green', filter: null, iso: null, hint: '' },
    { num: d.totalRacCirculation ?? '0', label: 'RAC Dolaşım', cls: 'red', filter: null, iso: null, hint: '' },
  ];
  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card ${c.filter ? 'clickable' : ''} ${activeFilter===c.filter && c.filter ? 'active-filter' : ''}"
         ${c.filter ? `onclick="applyStatFilter('${c.filter}', ${c.iso ? "'"+c.iso+"'" : 'null'}, '${c.label}')"` : ''}>
      <div class="num ${c.cls}">${c.num ?? 0}</div>
      <div class="label">${c.label}</div>
      ${c.hint ? `<div class="filter-hint">${c.hint}</div>` : ''}
    </div>`).join('');
}

function applyStatFilter(filterKey, isoDate, label) {
  activeFilter = filterKey;
  const bar = document.getElementById('filter-bar');
  bar.style.display = 'flex';
  document.getElementById('filter-label').textContent = '🔽 Filtre: ' + label;
  bar._isoDate = isoDate;
  // Auto-set dropdown filters based on stat card click
  if (filterKey === 'verified') { document.getElementById('verified-filter').value = 'true'; }
  else if (filterKey === 'unverified') { document.getElementById('verified-filter').value = 'false'; }
  else if (filterKey === 'banned') { document.getElementById('status-filter').value = 'BANNED'; }
  else if (filterKey === 'bots') { document.getElementById('bot-filter').value = 'true'; }
  else { document.getElementById('status-filter').value = ''; document.getElementById('verified-filter').value = ''; document.getElementById('bot-filter').value = ''; }
  loadUsers(1);
  loadStats();
}

function clearFilter() {
  activeFilter = null;
  document.getElementById('filter-bar').style.display = 'none';
  document.getElementById('filter-bar')._isoDate = null;
  document.getElementById('status-filter').value = '';
  document.getElementById('verified-filter').value = '';
  document.getElementById('bot-filter').value = '';
  loadUsers(1);
  loadStats();
}

async function loadRecent() {
  const res = await apiFetch('/admin/users?limit=8&page=1');
  const d = await res.json();
  document.getElementById('recent-time').textContent = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
  if (!d.users?.length) { document.getElementById('recent-list').innerHTML = '<div class="loading">Henüz kayıt yok.</div>'; return; }
  document.getElementById('recent-list').innerHTML = d.users.slice(0,3).map((u, i) => `
    <div class="new-reg">
      <div class="dot" style="background:${u.emailVerified?'#2ecc71':'#f39c12'}"></div>
      <span style="color:#4A90E2;font-weight:bold;font-size:11px;">PROFILE-${u.profileNumber || (i+1)}</span>
      <div class="email">${u.email || u.slogan || '—'}</div>
      <span class="badge ${u.emailVerified?'verified':'pending'}">${u.emailVerified?'✓ Doğrulandı':'⏳ Bekliyor'}</span>
      <div class="time">${timeAgo(u.createdAt)}</div>
      <button class="sm" style="margin:0" onclick="viewUser('${u.id}')">Detay</button>
    </div>`).join('');
}

async function loadUsers(page) {
  currentPage = page;
  const search   = document.getElementById('search-input').value.trim();
  const status   = document.getElementById('status-filter').value;
  const verified = document.getElementById('verified-filter').value;
  const botVal   = document.getElementById('bot-filter').value;
  const params = new URLSearchParams({ page, limit: 20 });
  if (search)   params.set('search', search);
  if (status)   params.set('status', status);
  if (verified) params.set('emailVerified', verified);
  if (botVal)   params.set('isBot', botVal);
  const bar = document.getElementById('filter-bar');
  if (activeFilter && bar._isoDate) params.set('createdAfter', bar._isoDate);

  document.getElementById('users-table').innerHTML = '<div class="loading">Yükleniyor...</div>';
  const res = await apiFetch('/admin/users?' + params);
  const d = await res.json();
  document.getElementById('users-count').textContent = `${d.total ?? 0} kullanıcı`;
  document.getElementById('page-info').textContent = `Sayfa ${d.page} / ${d.totalPages || 1}`;
  if (!d.users?.length) { document.getElementById('users-table').innerHTML = '<div class="loading">Kullanıcı bulunamadı.</div>'; return; }

  const startIdx = ((d.page || 1) - 1) * 20;
  const rows = d.users.map((u, i) => `
    <tr>
      <td style="color:#555;font-size:11px;">${startIdx + i + 1}</td>
      <td style="color:#4A90E2;font-weight:bold;font-size:11px;">PROFILE-${u.profileNumber || (startIdx + i + 1)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${u.email||''}">${u.email||'—'} ${u.isBot?'<span class="badge bot">BOT</span>':''}</td>
      <td>${u.slogan||'—'}</td>
      <td><span class="badge ${u.status==='BANNED'?'banned':'active'}">${u.status}</span></td>
      <td><span class="badge ${u.emailVerified?'verified':'pending'}">${u.emailVerified?'✓':'⏳'}</span></td>
      <td>${u.wac ? parseFloat(u.wac.wacBalance).toFixed(2) : '0'}</td>
      <td>${u.rac ? u.rac.racBalance.toString() : '0'}</td>
      <td>${u._count?.campaigns ?? 0}</td>
      <td style="white-space:nowrap;" title="${new Date(u.createdAt).toLocaleString('tr-TR')}">${timeAgo(u.createdAt)}</td>
      <td style="white-space:nowrap;">
        ${u.status==='BANNED'
          ? `<button class="sm success" onclick="banUser('${u.id}','UNBAN')">Aktif Et</button>`
          : `<button class="sm danger" onclick="banUser('${u.id}','BAN')">Banla</button>`}
        ${!u.emailVerified ? `<button class="sm warn" onclick="manualVerify('${u.id}')">Doğrula</button>` : ''}
        <button class="sm notify-btn" onclick="openNotify('${u.id}','${(u.email||u.slogan||'').replace(/'/g,'&apos;')}')">📢</button>
        <button class="sm" onclick="viewUser('${u.id}')">Detay</button>
      </td>
    </tr>`).join('');

  document.getElementById('users-table').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>ID</th><th>Email</th><th>Kullanıcı</th><th>Durum</th><th>Email</th><th>WAC</th><th>RAC</th><th>Kampanya</th><th>Kayıt</th><th>İşlem</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => loadUsers(1), 400); }
function changePage(delta) { loadUsers(Math.max(1, currentPage + delta)); }

async function banUser(userId, action) {
  if (!confirm(`Bu kullanıcıyı ${action==='BAN'?'banlamak':'aktif etmek'} istediğinize emin misiniz?`)) return;
  const res = await apiFetch('/admin/ban', {method:'POST', body:JSON.stringify({targetUserId:userId,action})});
  if (res.ok) loadAll(); else alert('İşlem başarısız.');
}

async function manualVerify(userId) {
  if (!confirm('Bu kullanıcının emailini manuel olarak doğrulamak istiyor musunuz?')) return;
  const res = await apiFetch('/admin/verify-email', {method:'POST', body:JSON.stringify({userId})});
  if (res.ok) loadAll(); else alert('İşlem başarısız.');
}

function openNotify(userId, email) {
  document.getElementById('notify-user-id').value = userId;
  document.getElementById('notify-user-email').textContent = email;
  document.getElementById('notify-title').value = '';
  document.getElementById('notify-message').value = '';
  document.getElementById('notify-result').textContent = '';
  document.getElementById('notify-modal').classList.add('open');
}

async function sendNotify() {
  const userId  = document.getElementById('notify-user-id').value;
  const title   = document.getElementById('notify-title').value.trim();
  const message = document.getElementById('notify-message').value.trim();
  if (!title || !message) { document.getElementById('notify-result').textContent = 'Başlık ve mesaj gerekli.'; return; }
  const res = await apiFetch('/admin/notify', {method:'POST', body:JSON.stringify({userId,title,message})});
  if (res.ok) {
    document.getElementById('notify-result').style.color = '#2ecc71';
    document.getElementById('notify-result').textContent = '✓ Bildirim gönderildi!';
    setTimeout(() => closeModal('notify-modal'), 1500);
  } else {
    document.getElementById('notify-result').style.color = '#e74c3c';
    document.getElementById('notify-result').textContent = 'Gönderim başarısız.';
  }
}

async function viewUser(userId) {
  document.getElementById('detail-modal').classList.add('open');
  document.getElementById('detail-content').innerHTML = '<div class="loading">Yükleniyor...</div>';
  const res = await apiFetch('/admin/users/' + userId);
  const { user } = await res.json();
  document.getElementById('detail-title').textContent = user.email || user.slogan || 'Kullanıcı';
  const rows = [
    ['ID', user.id], ['Email', user.email||'—'], ['Kullanıcı Adı', user.slogan||'—'],
    ['Rol', user.role], ['Durum', user.status],
    ['Email Doğrulandı', user.emailVerified ? '✓ Evet' : '✗ Hayır'],
    ['WAC Bakiye', user.wac ? parseFloat(user.wac.wacBalance).toFixed(4)+' WAC' : '—'],
    ['RAC Bakiye', user.rac ? user.rac.racBalance.toString()+' RAC' : '—'],
    ['Kampanya', user._count?.campaigns??0], ['Takipçi', user._count?.followers??0],
    ['Takip Edilen', user._count?.following??0],
    ['Kayıt', new Date(user.createdAt).toLocaleString('tr-TR')],
  ];
  document.getElementById('detail-content').innerHTML = rows.map(([k,v]) =>
    `<div class="detail-row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('') +
    (user.campaigns?.length
      ? '<div style="margin-top:14px;font-size:11px;color:#666;margin-bottom:6px;">KAMPANYALAR</div>' +
        user.campaigns.map(c=>`<div class="detail-row"><span class="k">${c.title}</span><span class="v badge ${c.isActive?'active':'banned'}">${c.isActive?'Aktif':'Pasif'}</span></div>`).join('')
      : '');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalBg(e, id) { if (e.target.id === id) closeModal(id); }

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff/60000);
  if (m<1) return 'Az önce'; if (m<60) return m+' dk önce';
  const h = Math.floor(m/60); if (h<24) return h+' saat önce';
  const d = Math.floor(h/24); if (d<7) return d+' gün önce';
  return new Date(dateStr).toLocaleDateString('tr-TR');
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ── Tab Switching ──────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const tabs = document.querySelectorAll('.tab');
  if (tab === 'users') {
    tabs[0].classList.add('active');
    document.getElementById('tab-users').classList.add('active');
  } else if (tab === 'wallets') {
    tabs[1].classList.add('active');
    document.getElementById('tab-wallets').classList.add('active');
    loadWallets(1);
  } else {
    tabs[2].classList.add('active');
    document.getElementById('tab-devnotes').classList.add('active');
  }
}

// ── Dev Notes ──────────────────────────────────────────────────────────────
let noteCurrentPage = 1;

async function loadDevNotes(page) {
  noteCurrentPage = page;
  const category = document.getElementById('note-category-filter').value;
  const isRead   = document.getElementById('note-read-filter').value;
  const params   = new URLSearchParams({ page, limit: 20 });
  if (category) params.set('category', category);
  if (isRead)   params.set('isRead', isRead);

  document.getElementById('devnotes-list').innerHTML = '<div class="loading">Yükleniyor...</div>';
  const res = await apiFetch('/admin/dev-notes?' + params);
  const d = await res.json();
  document.getElementById('note-page-info').textContent = `Sayfa ${d.page} / ${d.totalPages || 1}`;

  if (!d.notes?.length) {
    document.getElementById('devnotes-list').innerHTML = '<div class="loading">Not bulunamadı.</div>';
    return;
  }

  const catIcon = { BUG: '🐛', SUGGESTION: '💡', FEEDBACK: '💬' };
  const catClass = { BUG: 'bug', SUGGESTION: 'suggestion', FEEDBACK: 'feedback' };

  document.getElementById('devnotes-list').innerHTML = d.notes.map(n => `
    <div class="note-card" style="${!n.isRead ? 'border-color:#f39c12;' : ''}">
      <div class="note-meta">
        <span class="badge ${catClass[n.category]}">${catIcon[n.category]} ${n.category}</span>
        <span>${n.user?.email || n.user?.slogan || '—'}</span>
        ${n.user?.isBot ? '<span class="badge bot">BOT</span>' : ''}
        <span class="badge ${n.isRead ? 'read' : 'unread'}">${n.isRead ? 'Okundu' : 'Yeni'}</span>
        <span style="margin-left:auto;">${timeAgo(n.createdAt)}</span>
        ${!n.isRead ? `<button class="sm success" onclick="markNoteRead('${n.id}')" style="margin:0;">✓ Okundu</button>` : ''}
      </div>
      <div class="note-text">${escHtml(n.content)}</div>
    </div>`).join('');
}

function changeNotePage(delta) { loadDevNotes(Math.max(1, noteCurrentPage + delta)); }

async function markNoteRead(noteId) {
  const res = await apiFetch('/admin/dev-notes/' + noteId + '/read', { method: 'POST' });
  if (res.ok) { loadDevNotes(noteCurrentPage); loadStats(); }
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Wallets ─────────────────────────────────────────────────────────────────
let walletCurrentPage = 1;
let walletSearchTimer = null;

async function loadWallets(page) {
  walletCurrentPage = page;
  const search = document.getElementById('wallet-search').value.trim();
  const sortBy = document.getElementById('wallet-sort').value;
  const params = new URLSearchParams({ page, limit: 20, sortBy, sortDir: 'desc' });
  if (search) params.set('search', search);

  document.getElementById('wallets-table').innerHTML = '<div class="loading">Yükleniyor...</div>';
  const res = await apiFetch('/admin/wallets?' + params);
  const d = await res.json();
  document.getElementById('wallets-count').textContent = `${d.total ?? 0} cüzdan`;
  document.getElementById('wallet-page-info').textContent = `Sayfa ${d.page} / ${d.totalPages || 1}`;

  if (!d.wallets?.length) { document.getElementById('wallets-table').innerHTML = '<div class="loading">Cüzdan bulunamadı.</div>'; return; }

  const rows = d.wallets.map(w => `
    <tr>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${w.email||''}">${w.email||'—'} ${w.isBot?'<span class="badge bot">BOT</span>':''}</td>
      <td>${w.slogan||'—'}</td>
      <td style="font-weight:bold;color:#2ecc71;">${parseFloat(w.wacBalance).toFixed(2)}</td>
      <td style="font-weight:bold;color:#e74c3c;">${w.racBalance}</td>
      <td><span class="badge ${w.wacActive?'active':'pending'}">${w.wacActive?'Aktif':'Pasif'}</span></td>
      <td>
        <button class="sm" onclick="viewUser('${w.id}')">Detay</button>
      </td>
    </tr>`).join('');

  document.getElementById('wallets-table').innerHTML = `
    <table>
      <thead><tr><th>Email</th><th>Kullanıcı</th><th>WAC</th><th>RAC</th><th>WAC Durum</th><th>İşlem</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function debounceWalletSearch() { clearTimeout(walletSearchTimer); walletSearchTimer = setTimeout(() => loadWallets(1), 400); }
function changeWalletPage(delta) { loadWallets(Math.max(1, walletCurrentPage + delta)); }

// ── Campaigns ─────────────────────────────────────────────────────────────
let campaignCurrentPage = 1;
async function loadCampaigns(page) {
  campaignCurrentPage = page;
  const params = new URLSearchParams({ page, limit: 20 });
  document.getElementById('campaigns-table').innerHTML = '<div class="loading">Yükleniyor...</div>';
  try {
    const res = await apiFetch('/admin/campaigns?' + params);
    const d = await res.json();
    document.getElementById('campaigns-count').textContent = `${d.total ?? d.campaigns?.length ?? 0} kampanya`;
    document.getElementById('campaign-page-info').textContent = `Sayfa ${page}`;
    const campaigns = d.campaigns || [];
    if (!campaigns.length) { document.getElementById('campaigns-table').innerHTML = '<div class="loading">Kampanya bulunamadı.</div>'; return; }

    const rows = campaigns.map((c, i) => {
      const startIdx = (page - 1) * 20;
      return `<tr>
        <td style="color:#555;font-size:11px;">${startIdx + i + 1}</td>
        <td style="font-weight:bold;color:#4A90E2;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.title||'—'}</td>
        <td>${c.slogan||'—'}</td>
        <td><span class="badge ${c.isActive?'active':'banned'}">${c.isActive?'Aktif':'Pasif'}</span></td>
        <td>${c.stanceType||'—'}</td>
        <td>${c.categoryType||'—'}</td>
        <td style="font-weight:bold;color:#2ecc71;">${parseFloat(c.totalWacStaked||0).toFixed(2)}</td>
        <td>${c._count?.members || c.memberCount || 0}</td>
        <td style="white-space:nowrap;">${timeAgo(c.createdAt)}</td>
        <td><button class="sm" onclick="viewCampaign('${c.id}')">Detay</button></td>
      </tr>`;
    }).join('');

    document.getElementById('campaigns-table').innerHTML = `
      <table>
        <thead><tr><th>#</th><th>Başlık</th><th>Slogan</th><th>Durum</th><th>Duruş</th><th>Kategori</th><th>WAC</th><th>Üye</th><th>Oluşturulma</th><th>İşlem</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('campaigns-table').innerHTML = '<div class="loading">Hata oluştu.</div>';
  }
}
function changeCampaignPage(delta) { loadCampaigns(Math.max(1, campaignCurrentPage + delta)); }

async function viewCampaign(cid) {
  try {
    const res = await apiFetch('/admin/campaigns');
    const d = await res.json();
    const c = (d.campaigns || []).find(x => x.id === cid);
    if (!c) { alert('Kampanya bulunamadı.'); return; }
    document.getElementById('detail-title').textContent = 'Kampanya Detayı';
    document.getElementById('detail-content').innerHTML = `
      <div class="detail-row"><div class="k">ID</div><div class="v">${c.id}</div></div>
      <div class="detail-row"><div class="k">Başlık</div><div class="v">${c.title}</div></div>
      <div class="detail-row"><div class="k">Slogan</div><div class="v">${c.slogan||'—'}</div></div>
      <div class="detail-row"><div class="k">Duruş</div><div class="v">${c.stanceType||'—'}</div></div>
      <div class="detail-row"><div class="k">Kategori</div><div class="v">${c.categoryType||'—'}</div></div>
      <div class="detail-row"><div class="k">Toplam WAC</div><div class="v" style="color:#2ecc71;">${parseFloat(c.totalWacStaked||0).toFixed(2)}</div></div>
      <div class="detail-row"><div class="k">Üye Sayısı</div><div class="v">${c._count?.members || 0}</div></div>
      <div class="detail-row"><div class="k">Aktif</div><div class="v">${c.isActive?'Evet':'Hayır'}</div></div>
      <div class="detail-row"><div class="k">Oluşturulma</div><div class="v">${new Date(c.createdAt).toLocaleString('tr-TR')}</div></div>
      <div class="detail-row"><div class="k">Lider</div><div class="v">${c.leaderId}</div></div>
    `;
    openModal('detail-modal');
  } catch { alert('Detay yüklenemedi.'); }
}
